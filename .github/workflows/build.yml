name: Build Windows App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run dist

      - name: Package build
        shell: pwsh
        run: Compress-Archive -Path "dist/win-unpacked/*" -DestinationPath "Markdown-Viewer-Windows.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Markdown-Viewer-Windows
          path: Markdown-Viewer-Windows.zip
