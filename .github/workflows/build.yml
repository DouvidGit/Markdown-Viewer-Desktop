name: Build Windows App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run dist

      - name: Package build
        shell: pwsh
        run: Compress-Archive -Path "dist/win-unpacked/*" -DestinationPath "Markdown-Viewer-Windows.zip" -Force

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$env:GITHUB_REF_NAME" "Markdown-Viewer-Windows.zip" --repo "$env:GITHUB_REPOSITORY" --clobber
